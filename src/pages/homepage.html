<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .primary-orange { color: #fc3d03; }
        .bg-primary-orange { background-color: #fc3d03; }
        .border-primary-orange { border-color: #fc3d03; }
        .glow-radial {
            background: radial-gradient(circle at center, rgba(252, 61, 3, 0.08) 0%, rgba(19, 19, 19, 0) 70%);
        }
    </style>

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<main class="relative h-screen w-full flex items-center justify-center">

<div class="absolute inset-0 glow-radial pointer-events-none"></div>
<!-- Hero Section Canvas -->
<section class="relative z-10 w-full max-w-container-max-width px-margin-page flex flex-col items-center text-center">
<!-- Headline -->
<h1 class="font-h1 text-[clamp(3.5rem,10vw,7rem)] font-black tracking-tighter text-white leading-[0.9] mb-12">
                Learn.<br/>Build.<br/>Document.
            </h1>
<!-- Buttons -->
<div class="flex flex-col sm:flex-row gap-gutter">
<button class="px-10 py-4 bg-primary-orange text-black font-space-grotesk font-bold text-lg uppercase tracking-wider transition-all hover:scale-[1.02] active:scale-95">
                    Start exploring
                </button>
<button class="px-10 py-4 bg-transparent border border-white text-white font-space-grotesk font-bold text-lg uppercase tracking-wider transition-all hover:bg-white hover:text-black active:scale-95">
                    Latest updates
                </button>
</div>
</section>
